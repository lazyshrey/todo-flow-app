name: Publish todo-flow-mcp to npm

on:
  push:
    branches:
      - main
    paths:
      - 'apps/mcp-server/**'
      - '.github/workflows/publish-mcp.yml'
  workflow_dispatch:

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build MCP server
        run: npm run build --workspace=apps/mcp-server

      - name: Check version and publish
        working-directory: apps/mcp-server
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          
          # Check if the package is already on npm (returns 0.0.0 if not found)
          NPM_VERSION=$(npm view todo-flow-mcp version 2>/dev/null || echo "0.0.0")
          
          echo "Local version: $LOCAL_VERSION"
          echo "NPM version: $NPM_VERSION"
          
          if [ "$LOCAL_VERSION" != "$NPM_VERSION" ]; then
            echo "New version detected ($LOCAL_VERSION). Publishing to npm..."
            npm publish --provenance
          else
            echo "Version $LOCAL_VERSION is already published. Skipping."
          fi
